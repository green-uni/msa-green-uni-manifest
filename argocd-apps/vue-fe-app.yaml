apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vue-fe
  namespace: argocd
  annotations:
    # Image Updater 설정
    argocd-image-updater.argoproj.io/image-list: vue-fe=harbor.greenart.n-e.kr/greenuni/vue-fe
    argocd-image-updater.argoproj.io/vue-fe.update-strategy: newest-build
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/git-creds
spec:
  project: default
  source:
    repoURL: https://github.com/green-uni/msa-green-uni-manifest.git
    targetRevision: main
    path: ./charts/vue-fe # 프론트엔드용 Helm 차트 경로
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true