apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: academic-service
  namespace: argocd
  annotations:
    # 1. 감시할 이미지 설정 (별칭:이미지경로)
    argocd-image-updater.argoproj.io/image-list: academic=harbor.greenart.n-e.kr/greenuni/academic-service
    
    # 2. 업데이트 전략: 빌드 시간이 가장 최신인 이미지를 선택
    argocd-image-updater.argoproj.io/academic.update-strategy: newest-build
    
    # 3. Git Write-back 설정: 'git-creds' 시크릿 사용
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/git-creds
    
spec:
  project: default
  source:
    repoURL: https://github.com/green-uni/msa-green-uni-manifest.git
    targetRevision: main
    path: ./charts/academic-service # 실제 Helm 차트나 YAML이 있는 경로
  destination:
    server: https://kubernetes.default.svc
    namespace: app # 서비스가 실제로 돌아갈 네임스페이스
  syncPolicy:
    automated:
      prune: true
      selfHeal: true