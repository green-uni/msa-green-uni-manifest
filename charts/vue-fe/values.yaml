# values.yaml 예시
replicaCount: 1

image:
  # Harbor 경로 입력
  repository: harbor.greenart.n-e.kr/greenuni/vue-fe 
  pullPolicy: IfNotPresent
  # 이 tag 부분이 Image Updater에 의해 자동으로 업데이트됩니다.
  tag: "2" 

service:
  type: NodePort
  port: 80 # 서비스 내부 포트
  targetPort: 80
  nodePort: 30890 

# 환경 변수 등 필요한 설정 추가
env:
  - name: SPRING_PROFILES_ACTIVE
    value: "prod"
  - name: SPRING_JPA_DATABASE_PLATFORM
    value: "org.hibernate.dialect.MariaDBDialect"